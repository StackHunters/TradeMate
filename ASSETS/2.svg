<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Growth chart with handshake element -->
  <g transform="translate(5, 10)">
    <!-- Chart bars -->
    <rect x="0" y="25" width="6" height="15" fill="url(#iconGradient)" rx="2"/>
    <rect x="9" y="18" width="6" height="22" fill="url(#iconGradient)" rx="2"/>
    <rect x="18" y="12" width="6" height="28" fill="url(#iconGradient)" rx="2"/>
    <rect x="27" y="8" width="6" height="32" fill="url(#iconGradient)" rx="2"/>
    
    <!-- Upward arrow -->
    <path d="M 35 5 L 39 1 L 43 5 M 39 2 L 39 12" stroke="url(#iconGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Handshake element -->
    <circle cx="22" cy="6" r="3" fill="#667eea" opacity="0.8"/>
    <circle cx="28" cy="6" r="3" fill="#764ba2" opacity="0.8"/>
  </g>
  
  <!-- Text: Trade Mate -->
  <g transform="translate(55, 15)">
    <!-- "Trade" -->
    <text x="0" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="url(#textGradient)" letter-spacing="-0.5">
      Trade
    </text>
    
    <!-- "Mate" -->
    <text x="0" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="url(#iconGradient)" letter-spacing="-0.5">
      Mate
    </text>
  </g>
  
  <!-- Tagline (optional - can be removed) -->
  <text x="55" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="400" fill="#718096" letter-spacing="0.5">
    YOUR TRADING PARTNER
  </text>
</svg>
